<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Counter | Modern Calculator</title>
    <link rel="stylesheet" href="Calculator.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="calc-frame">
        <div class="calc-screen" id="display">0</div>
        
        <div class="calc-pad">
            <button type="button" class="key action-key" value="clear">AC</button>
            <button type="button" class="key math-key" value="/">&divide;</button>
            <button type="button" class="key math-key" value="*">&times;</button>
            <button type="button" class="key math-key" value="-">&minus;</button>

            <button type="button" class="key digit-key" value="7">7</button>
            <button type="button" class="key digit-key" value="8">8</button>
            <button type="button" class="key digit-key" value="9">9</button>
            <button type="button" class="key math-key double-height" value="+">+</button>

            <button type="button" class="key digit-key" value="4">4</button>
            <button type="button" class="key digit-key" value="5">5</button>
            <button type="button" class="key digit-key" value="6">6</button>

            <button type="button" class="key digit-key" value="1">1</button>
            <button type="button" class="key digit-key" value="2">2</button>
            <button type="button" class="key digit-key" value="3">3</button>
            <button type="button" class="key resolve-key double-height" value="=">=</button>

            <button type="button" class="key digit-key double-width" value="0">0</button>
            <button type="button" class="key digit-key" value=".">.</button>
        </div>
    </div>

    <script src="Calculator.js"></script>
</body>
</html>
